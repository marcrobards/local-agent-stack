# Beszel — Server Monitoring for local-agent-stack
# 
# SETUP:
#   1. docker compose -f docker-compose.beszel.yml up -d beszel
#   2. Open http://localhost:8090 and create an admin account
#   3. Click "Add System" → copy the KEY and TOKEN values
#   4. Edit this file: replace <key> and <token> below
#   5. docker compose -f docker-compose.beszel.yml up -d
#
# Or add these services to your main docker-compose.yml.
#
# Dashboard: http://localhost:8090
# Also accessible from Danielle's iPad at http://<server-ip>:8090

services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      - APP_URL=http://localhost:8090
    ports:
      - "8090:8090"
    volumes:
      - ./beszel_data:/beszel_data
      - ./beszel_socket:/beszel_socket

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./beszel_agent_data:/var/lib/beszel-agent
      - ./beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://localhost:8090
      TOKEN: ${BESZEL_TOKEN}
      KEY: ${BESZEL_KEY}
    depends_on:
      - beszel
