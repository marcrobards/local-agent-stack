services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - default
      - pai_net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui_data:/app/backend/data
    depends_on:
      - ollama
    networks:
      - default
      - pai_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Monitoring ──────────────────────────────────────
  # Beszel — lightweight server + Docker container monitoring
  # Dashboard: http://localhost:8090
  #
  # FIRST-TIME SETUP:
  #   1. docker compose up -d beszel
  #   2. Open http://localhost:8090 → create admin account
  #   3. Click "Add System" → copy the KEY and TOKEN values
  #   4. Paste them into .env (BESZEL_KEY and BESZEL_TOKEN)
  #   5. docker compose up -d

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      - APP_URL=http://localhost:8090
    ports:
      - "8090:8090"
    volumes:
      - ./beszel_data:/beszel_data
      - ./beszel_socket:/beszel_socket

  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./beszel_agent_data:/var/lib/beszel-agent
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      # - /mnt/disk/.beszel:/extra-filesystems/sda1:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      TOKEN: ${BESZEL_TOKEN}
      KEY: ${BESZEL_KEY}
      HUB_URL: http://localhost:8090
    depends_on:
      - beszel

  # ── Shopping App ──────────────────────────────────

  shopping-frontend:
    build:
      context: ./src/shopping-app/frontend
    container_name: shopping-frontend
    ports:
      - "3001:3001"
    environment:
      - API_URL=http://shopping-backend:8000
    depends_on:
      - shopping-backend
    restart: unless-stopped

  shopping-backend:
    build:
      context: ./src/shopping-app/backend
    container_name: shopping-backend
    ports:
      - "8000:8000"
    volumes:
      - shopping_data:/data
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped

  # ── Tools (opt-in) ─────────────────────────────────

  memory-chat:
    profiles: ["tools"]
    build:
      context: ./src/agent-memory-layer
    container_name: memory-chat
    stdin_open: true
    tty: true
    command: ["python", "memory_chat.py"]
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - qdrant
      - ollama


volumes:
  ollama_data:
    external: true
    name: ollama_ollama_data
  open-webui_data:
    external: true
    name: ollama_open-webui_data
  qdrant_data:
    external: true
    name: agent-memory_qdrant_data
  shopping_data:
  beszel_data:
  beszel_agent_data:
  beszel_socket:

networks:
  pai_net:
    external: true
    name: pai_net