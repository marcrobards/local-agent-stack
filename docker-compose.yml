services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui_data:/app/backend/data
    depends_on:
      - ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Monitoring ──────────────────────────────────────
  # Beszel — lightweight server + Docker container monitoring
  # Dashboard: http://localhost:8090
  #
  # FIRST-TIME SETUP:
  #   1. docker compose up -d beszel
  #   2. Open http://localhost:8090 → create admin account
  #   3. Click "Add System" → copy the KEY and TOKEN values
  #   4. Paste them into .env (BESZEL_KEY and BESZEL_TOKEN)
  #   5. docker compose up -d

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      - APP_URL=http://localhost:8090
    ports:
      - "8090:8090"
    volumes:
      - ./beszel_data:/beszel_data
      - ./beszel_socket:/beszel_socket

  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./beszel_agent_data:/var/lib/beszel-agent
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      # - /mnt/disk/.beszel:/extra-filesystems/sda1:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      TOKEN: ${BESZEL_TOKEN}
      KEY: ${BESZEL_KEY}
      HUB_URL: http://localhost:8090
    depends_on:
      - beszel

  # ── Shopping Pipeline ────────────────────────────────
  # Runs the Open WebUI Pipelines server on port 9099.
  # Has access to Ollama and Qdrant via the Docker Compose network.
  # Contains the full local-agent-stack repo baked in at build time
  # with mem0ai, qdrant-client, ollama, requests, bs4 pre-installed.
  #
  # In Open WebUI:
  #   Admin Panel → Settings → Connections → + (add connection)
  #   URL:     http://shopping-pipeline:9099
  #   API Key: 0p3n-w3bu!
  #   Save — "Shopping Agent" will appear in the model dropdown.

  shopping-pipeline:
    build:
      context: .          # repo root — Dockerfile is at ./Dockerfile.pipeline
      dockerfile: Dockerfile.pipeline
    container_name: shopping-pipeline
    restart: unless-stopped
    environment:
      - PIPELINES_API_KEY=0p3n-w3bu!
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_LLM_MODEL=qwen2.5:7b
      - OLLAMA_VISION_MODEL=qwen2.5vl:7b
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=agent_memory
      - OLLAMA_EMBED_MODEL=nomic-embed-text:latest
      - OLLAMA_EMBED_DIMS=768
      - USER_ID=test_user
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BROWSER_USE_API_KEY=${BROWSER_USE_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - SEARCH_LLM=${SEARCH_LLM}
    depends_on:
      - ollama
      - qdrant
    # No ports exposed to host — Open WebUI reaches it via the internal network.
    # If you ever need to test from the host, uncomment the line below:
    # ports:
    #   - "9099:9099"

  # ── Tools (opt-in) ─────────────────────────────────

  memory-chat:
    profiles: ["tools"]
    build:
      context: ./src/agent-memory-layer
    container_name: memory-chat
    stdin_open: true
    tty: true
    command: ["python", "memory_chat.py"]
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - qdrant
      - ollama

  smoke-test-stage02a:
    profiles: ["tools"]
    image: python:3.12-slim
    container_name: smoke-test-stage02a
    working_dir: /app
    command: >
      sh -c "pip install ollama requests --quiet &&
             python src/workflows/online-shopping/tests/smoke_test_02a.py"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_VISION_MODEL=qwen2.5vl:7b
    volumes:
      - .:/app
    depends_on:
      - ollama

  smoke-test-browser-use:
    profiles: ["tools"]
    build:
      context: ./src/workflows/online-shopping
      dockerfile: Dockerfile.browser-use
    container_name: smoke-test-browser-use
    init: true
    ipc: host
    entrypoint: ["/app/.venv/bin/python"]
    command: ["/app/tests/smoke_test_browser_use.py"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-0}
      - BROWSER_USE_API_KEY=${BROWSER_USE_API_KEY}
    volumes:
      - ./src/workflows/online-shopping/tests:/app/tests:ro
    # No dependency on ollama — uses Anthropic cloud API + Browser Use Cloud


volumes:
  ollama_data:
    external: true
    name: ollama_ollama_data
  open-webui_data:
    external: true
    name: ollama_open-webui_data
  qdrant_data:
    external: true
    name: agent-memory_qdrant_data
  beszel_data:
  beszel_agent_data:
  beszel_socket: